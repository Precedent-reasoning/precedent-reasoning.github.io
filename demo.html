<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/icon.png" type="image/png" />
<title>Precedent Reasoning — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  img, svg { display: block; }
  button, input, textarea { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  :root {
    --bg:        oklch(0.16 0.025 255);
    --bg-2:      oklch(0.195 0.027 255);
    --bg-3:      oklch(0.235 0.03 255);
    --border:    oklch(0.32 0.03 255 / 0.9);
    --border-2:  oklch(0.40 0.035 255 / 0.6);
    --text:      oklch(0.96 0.008 255);
    --muted:     oklch(0.70 0.025 255);
    --faint:     oklch(0.55 0.022 255);
    --accent:    oklch(0.66 0.15 250);
    --accent-2:  oklch(0.76 0.15 250);
    --accent-ink: oklch(0.16 0.03 255);
    --glow:      oklch(0.66 0.15 250 / 0.35);
    --good:      oklch(0.74 0.13 160);
    --r-sm: 8px; --r-md: 12px; --r-lg: 18px;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;
    transition: background-color 0.5s ease, color 0.5s ease;
  }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 99px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-2); }
</style>
<link href="app-styles.css" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="theme.jsx"></script>
  <script type="text/babel" src="case-data.jsx"></script>
  <script type="text/babel" src="app-screen.jsx"></script>
</body>
</html>
